name: Newman Contract Tests

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "main" ]

jobs:
  newman:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Prism globally
        run: npm install -g @stoplight/prism-cli

      - name: Lint OpenAPI contracts
        run: npm run lint:contracts

      - name: Start Prism IoT mock server
        run: |
          nohup npm run mock:iot > prism-iot.log 2>&1 &

      - name: Start Prism Vision mock server
        run: |
          nohup npm run mock:vision > prism-vision.log 2>&1 &

      - name: Wait for mock servers
        run: |
          npx wait-on tcp:4010 tcp:4011 --timeout 30000

      - name: Run Newman contract tests
        run: npm run test:mock

      - name: Generate HTML report
        run: npm run test:html

      - name: Show Prism logs on failure
        if: failure()
        run: |
          cat prism-iot.log || true
          cat prism-vision.log || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/